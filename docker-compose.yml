services:
    db:
        image: postgres:17
        ports:
            - "127.0.0.1:5454:5432"
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - uptime_final_data:/var/lib/postgresql/data
            - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d uptime_monitor"]
            interval: 5s
            timeout: 3s
            retries: 5

    api:
        build: .
        ports:
            - "127.0.0.1:8080:8080"
        environment:
            - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
            - JWT_SECRET=${JWT_SECRET}
            - PORT=${PORT}
        depends_on:
            db:
                condition: service_healthy

volumes:
    uptime_final_data:
