services:
    db:
        image: postgres:17
        ports:
            - "5454:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: 1234567k
            POSTGRES_DB: uptime_monitor
        volumes:
            - uptime_final_data:/var/lib/postgresql/data
            - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d uptime_monitor"]
            interval: 5s
            timeout: 3s
            retries: 5

    api:
        build: .
        ports:
            - "8080:8080"
        environment:
            - DATABASE_URL=postgres://postgres:1234567k@db:5432/uptime_monitor?sslmode=disable
            - JWT_SECRET=inilah-my-secret-key->///<
            - PORT=8080
        depends_on:
            db:
                condition: service_healthy

volumes:
    uptime_final_data:
